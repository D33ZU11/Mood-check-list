<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Feelings & Needs Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
      font-family: 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem 1rem;
      color: #1e2a32;
    }

    .container { max-width: 800px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 2rem; color: #2c3e66; }

    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1.3rem;
      border-left: 5px solid #3b8b6e;
      padding-left: 0.8rem;
      margin-bottom: 1.2rem;
    }

    /* --- FORCE SIDE BY SIDE --- */
    .checklist-grid {
      display: flex;
      gap: 15px;
      align-items: flex-start;
    }

    .checklist-column {
      flex: 1; /* Makes both columns equal width */
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 8px 12px;
      border-radius: 50px;
      border: 1px solid #e2edf2;
      min-height: 45px;
    }

    /* Column 1: Checkbox on Left (Default) */
    .left-col .check-item {
      flex-direction: row;
    }

    /* Column 2: Checkbox on Right */
    .right-col .check-item {
      flex-direction: row-reverse;
      text-align: right;
    }

    .check-item label {
      flex: 1;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
    }

    input[type="checkbox"] {
      width: 1.3rem;
      height: 1.3rem;
      accent-color: #2c8f6e;
    }

    /* Rest of Styling */
    .choice-group { display: flex; gap: 10px; margin-top: 10px; }
    .choice-btn {
      flex: 1; text-align: center; background: #f1f5f9;
      padding: 12px; border-radius: 50px; cursor: pointer; font-weight: 600;
    }
    .selected-yes { background: #2b8c5e; color: white; }
    .selected-no { background: #bc6c4b; color: white; }
    .selected-maybe { background: #e6b12e; color: black; }

    .abc-options { display: flex; gap: 10px; margin-top: 10px; }
    .abc-card {
      flex: 1; text-align: center; padding: 15px;
      background: #f8fafc; border-radius: 1rem; cursor: pointer; border: 1px solid #dce5ec;
    }
    .abc-card.selected { background: #2e5f7a; color: white; }

    .action-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    button {
      padding: 12px 24px; border-radius: 50px; border: none;
      background: #2d5f7e; color: white; font-weight: 600; cursor: pointer;
    }
    .share-area { background: #fff; padding: 15px; border-radius: 1rem; margin-top: 20px; border: 1px solid #caddf0; }
    .share-link { font-family: monospace; font-size: 0.8rem; word-break: break-all; background: #eee; padding: 10px; display: block; margin: 10px 0; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🌱 voice board</h1>
    <p>check what I feel like doing</p>
  </div>

  <div class="card">
    <h2>📋 activities I'd like to do</h2>
    <div class="checklist-grid">
      <div class="checklist-column left-col" id="listLeft"></div>
      <div class="checklist-column right-col" id="listRight"></div>
    </div>
  </div>

  <div class="card">
    <h2>🤍 general feeling</h2>
    <div class="choice-group" id="yesNoGroup"></div>
  </div>

  <div class="card">
    <h2>🔘 Who's Getting Involved</h2>
    <div class="abc-options" id="abcGroup"></div>
  </div>

  <div class="card">
    <textarea id="freeNote" placeholder="Extra notes..." style="width:100%; padding:10px; border-radius:15px;"></textarea>
  </div>

  <div class="action-buttons">
    <button id="saveBtn">🔗 SAVE & CREATE LINK</button>
    <button onclick="location.reload()" style="background:#517a8b">⟳ RESET</button>
  </div>

  <div class="share-area" id="shareArea" style="display:none">
    <strong>Share this link:</strong>
    <span class="share-link" id="linkPath"></span>
    <button id="copyBtn" style="background:#458466">📋 COPY LINK</button>
  </div>
</div>

<script>
  const config = {
    activities: ["👅 Lick", "🫗 Swallow", "💦 Spit", "🎮 Play", "🍽️ Eat", "👗 Wear", "💾 Save", "📤 Share", "🫣 Humiliation"],
    yesNo: [{v:"yes", t:"✅ YES"}, {v:"no", t:"❌ NO"}, {v:"maybe", t:"🤔 MAYBE"}],
    abc: [{i:"👩‍❤️‍👨", l:"Both"}, {i:"🧛", l:"Just Me"}, {i:"🧕", l:"Just You"}]
  };

  let state = { acts: {}, yn: null, abc: null };

  function render() {
    const left = document.getElementById('listLeft');
    const right = document.getElementById('listRight');
    left.innerHTML = ''; right.innerHTML = '';

    config.activities.forEach((act, i) => {
      const div = document.createElement('div');
      div.className = 'check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = state.acts[act] || false;
      cb.onchange = () => state.acts[act] = cb.checked;
      
      const lbl = document.createElement('label');
      lbl.textContent = act;
      
      div.appendChild(cb);
      div.appendChild(lbl);
      
      // Put in left column first, then right column
      if (i < 5) { left.appendChild(div); } 
      else { right.appendChild(div); }
    });

    const ynBox = document.getElementById('yesNoGroup');
    ynBox.innerHTML = '';
    config.yesNo.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'choice-btn' + (state.yn === opt.v ? ' selected-' + opt.v : '');
      btn.textContent = opt.t;
      btn.onclick = () => { state.yn = opt.v; render(); };
      ynBox.appendChild(btn);
    });

    const abcBox = document.getElementById('abcGroup');
    abcBox.innerHTML = '';
    config.abc.forEach((opt, idx) => {
      const card = document.createElement('div');
      card.className = 'abc-card' + (state.abc === idx ? ' selected' : '');
      card.innerHTML = `<div>${opt.i}</div><div style="font-size:0.8rem">${opt.l}</div>`;
      card.onclick = () => { state.abc = idx; render(); };
      abcBox.appendChild(card);
    });
  }

  document.getElementById('saveBtn').onclick = () => {
    const data = btoa(encodeURIComponent(JSON.stringify({...state, note: document.getElementById('freeNote').value})));
    const url = window.location.href.split('#')[0] + '#data=' + data;
    document.getElementById('shareArea').style.display = 'block';
    document.getElementById('linkPath').textContent = url;
  };

  document.getElementById('copyBtn').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('linkPath').textContent);
    alert("Copied!");
  };

  // Load from URL if data exists
  const hash = window.location.hash;
  if (hash.includes('data=')) {
    try {
      const saved = JSON.parse(decodeURIComponent(atob(hash.split('data=')[1])));
      state = saved;
      document.getElementById('freeNote').value = saved.note || '';
    } catch(e) {}
  }

  render();
</script>
</body>
</html>
