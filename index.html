<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💋 Feelings & Needs Board • spicy love edition 💋</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ========= SENSUAL, SPICY, ROMANTIC THEME ========= */
    body {
      background: linear-gradient(145deg, #ffdde1 0%, #ee9ca7 100%);
      font-family: 'Segoe UI', 'Quicksand', 'Poppins', system-ui, sans-serif;
      padding: 1.5rem 1rem;
      color: #2e1b2c;
      position: relative;
    }

    /* soft animated heart overlay */
    body::before {
      content: "❤️‍🔥";
      font-size: 180px;
      position: fixed;
      bottom: -50px;
      right: -50px;
      opacity: 0.08;
      pointer-events: none;
      animation: slowSpin 25s infinite linear;
      z-index: 0;
    }

    @keyframes slowSpin {
      0% { transform: rotate(0deg); opacity: 0.06; }
      50% { opacity: 0.12; transform: rotate(5deg); }
      100% { transform: rotate(0deg); opacity: 0.06; }
    }

    .container { 
      max-width: 800px; 
      margin: 0 auto; 
      position: relative;
      z-index: 2;
    }

    /* sexy header glow + pulse */
    .header { 
      text-align: center; 
      margin-bottom: 2rem; 
    }
    .header h1 { 
      font-size: 2.2rem; 
      background: linear-gradient(120deg, #b82b5e, #ff6f91, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      animation: softPulse 1.8s infinite alternate;
      display: inline-block;
    }
    @keyframes softPulse {
      0% { text-shadow: 0 0 0px rgba(255, 80, 120, 0.2); }
      100% { text-shadow: 0 0 12px rgba(255, 80, 120, 0.6); }
    }
    .header p {
      font-size: 1rem;
      color: #6b2e4a;
      font-weight: 500;
      background: rgba(255,235,240,0.5);
      display: inline-block;
      padding: 5px 18px;
      border-radius: 60px;
      backdrop-filter: blur(2px);
    }

    /* cards with soft glass + hover lift + border sexy glow */
    .card {
      background: rgba(255, 248, 245, 0.92);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 105, 140, 0.3);
      padding: 1.5rem;
      margin-bottom: 2rem;
      transition: transform 0.25s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 35px rgba(160, 40, 80, 0.2), 0 0 0 1px #ff809f;
    }

    .card h2 {
      font-size: 1.4rem;
      border-left: 6px solid #e8436e;
      padding-left: 0.8rem;
      margin-bottom: 1.2rem;
      color: #a13054;
      font-weight: 700;
    }

    /* --- YOUR FORCE SIDE-BY-SIDE LAYOUT (exactly as you built) --- */
    .checklist-grid {
      display: flex;
      gap: 15px;
      align-items: flex-start;
    }

    .checklist-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff2f5;
      padding: 8px 12px;
      border-radius: 50px;
      border: 1px solid #ffbfcf;
      min-height: 45px;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }
    /* sexy hover effect on check items */
    .check-item:hover {
      background: #ffe2ea;
      border-color: #e8436e;
      transform: scale(1.01);
      box-shadow: 0 4px 10px rgba(232, 67, 110, 0.2);
    }

    /* Column 1: Checkbox on Left (Default) */
    .left-col .check-item {
      flex-direction: row;
    }

    /* Column 2: Checkbox on Right (your original design) */
    .right-col .check-item {
      flex-direction: row-reverse;
      text-align: right;
    }

    .check-item label {
      flex: 1;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      color: #441e32;
      letter-spacing: 0.2px;
    }

    /* sexy custom checkboxes */
    input[type="checkbox"] {
      width: 1.3rem;
      height: 1.3rem;
      accent-color: #ff4d7a;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    input[type="checkbox"]:active {
      transform: scale(0.85);
    }

    /* rest of styling (choices, abc, buttons) with spicy colors */
    .choice-group { 
      display: flex; 
      gap: 10px; 
      margin-top: 10px; 
    }
    .choice-btn {
      flex: 1; 
      text-align: center; 
      background: #fbe5ec;
      padding: 12px; 
      border-radius: 50px; 
      cursor: pointer; 
      font-weight: 700;
      transition: all 0.2s;
      border: 1px solid #ffb7c8;
      color: #882d50;
    }
    .choice-btn:hover {
      transform: translateY(-2px);
      background: #ffd9e3;
      box-shadow: 0 6px 12px rgba(232, 67, 110, 0.2);
    }
    .selected-yes { 
      background: #de5a7e; 
      color: white; 
      box-shadow: 0 4px 12px #de5a7e80;
      border-color: #fff0f3;
    }
    .selected-no { 
      background: #bc6c4b; 
      color: white;
      box-shadow: 0 4px 12px #bc6c4b80;
    }
    .selected-maybe { 
      background: #e6b12e; 
      color: #2c1a0c;
      box-shadow: 0 4px 12px #e6b12e80;
    }

    .abc-options { 
      display: flex; 
      gap: 10px; 
      margin-top: 10px; 
    }
    .abc-card {
      flex: 1; 
      text-align: center; 
      padding: 15px;
      background: #fef0f3;
      border-radius: 1rem; 
      cursor: pointer; 
      border: 1px solid #ffb7c8;
      transition: all 0.2s;
    }
    .abc-card:hover {
      background: #ffe2ea;
      transform: translateY(-3px);
      border-color: #e8436e;
    }
    .abc-card.selected { 
      background: #c94f73; 
      color: white; 
      box-shadow: 0 6px 14px rgba(201, 79, 115, 0.4);
    }

    /* textarea with kinky glow */
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 1.2rem;
      background: #fff5f7;
      border: 1px solid #ffa5bd;
      font-family: inherit;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #e8436e;
      box-shadow: 0 0 0 3px rgba(232, 67, 110, 0.2);
    }

    .action-buttons { 
      display: flex; 
      gap: 10px; 
      justify-content: center; 
      margin-top: 20px; 
    }
    button {
      padding: 12px 28px; 
      border-radius: 50px; 
      border: none;
      background: #c5486b; 
      color: white; 
      font-weight: 700; 
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button:hover {
      background: #da5a81;
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 20px rgba(197, 72, 107, 0.3);
    }
    button:active {
      transform: translateY(1px);
    }

    .share-area { 
      background: rgba(255, 245, 248, 0.95); 
      padding: 18px; 
      border-radius: 1.5rem; 
      margin-top: 20px; 
      border: 1px solid #ff99b5;
      backdrop-filter: blur(8px);
      animation: fadePop 0.4s ease;
    }
    @keyframes fadePop {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .share-link { 
      font-family: monospace; 
      font-size: 0.8rem; 
      word-break: break-all; 
      background: #ffeef3; 
      padding: 10px; 
      display: block; 
      margin: 10px 0; 
      border-radius: 20px;
      border: 1px solid #ff8eae;
      color: #a13458;
    }
    #copyBtn {
      background: #b5456b;
      padding: 8px 20px;
    }

    /* tiny sparkle heart animation for extra love */
    @keyframes floatingKiss {
      0% { transform: translateY(0) scale(0.8); opacity: 0.7; }
      100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
    }
    .kiss-emoji-anim {
      position: fixed;
      pointer-events: none;
      font-size: 1.6rem;
      z-index: 9999;
      animation: floatingKiss 0.8s ease-out forwards;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>💗 voice board • love & desire 💗</h1>
    <p>🔥 check what I feel like doing... be brave, baby 🔥</p>
  </div>

  <div class="card">
    <h2>🍑 activities I'd love to do with you</h2>
    <div class="checklist-grid">
      <div class="checklist-column left-col" id="listLeft"></div>
      <div class="checklist-column right-col" id="listRight"></div>
    </div>
  </div>

  <div class="card">
    <h2>💋 general feeling (tell me the vibe)</h2>
    <div class="choice-group" id="yesNoGroup"></div>
  </div>

  <div class="card">
    <h2>🖤 who's getting involved?</h2>
    <div class="abc-options" id="abcGroup"></div>
  </div>

  <div class="card">
    <textarea id="freeNote" placeholder="💬 whisper something sexy... fantasies, sweet words, or a little command 😈" rows="3"></textarea>
  </div>

  <div class="action-buttons">
    <button id="saveBtn">🔗 SAVE & CREATE SPICY LINK</button>
    <button id="resetBtn" style="background:#91647c;">⟳ RESET (fresh start)</button>
  </div>

  <div class="share-area" id="shareArea" style="display:none">
    <strong>💌 our secret love link 💌</strong>
    <span class="share-link" id="linkPath"></span>
    <button id="copyBtn">📋 COPY LINK & SEND TO ME</button>
  </div>
</div>

<script>
  // ---- YOUR ORIGINAL CONFIG (only upgraded with spicier labels) ----
  const config = {
    activities: ["👅 Lick", "🫗 Swallow", "💦 Spit", "🎮 Play", "🍽️ Eat", "👗 Wear", "💾 Save", "📤 Share", "🫣 Humiliation"],
    yesNo: [{v:"yes", t:"✅ YES (please 😈)"}, {v:"no", t:"❌ NO (maybe later?)"}, {v:"maybe", t:"🤔 MAYBE... tempt me"}],
    abc: [{i:"👩‍❤️‍👨", l:"Both"}, {i:"🧛", l:"Just Me"}, {i:"🧕", l:"Just You"}]
  };

  let state = { acts: {}, yn: null, abc: null };

  // sexy little floating kiss / heart effect (kinky touch)
  function showFloatingKiss(x, y, emoji = "💋") {
    const kissDiv = document.createElement('div');
    kissDiv.className = 'kiss-emoji-anim';
    kissDiv.innerHTML = emoji;
    kissDiv.style.left = (x - 15) + 'px';
    kissDiv.style.top = (y - 20) + 'px';
    document.body.appendChild(kissDiv);
    setTimeout(() => kissDiv.remove(), 800);
  }

  function showLoveBurst(targetElement) {
    const rect = targetElement.getBoundingClientRect();
    for(let i = 0; i < 4; i++) {
      setTimeout(() => {
        showFloatingKiss(rect.left + rect.width/2, rect.top + rect.height/2, ["❤️‍🔥", "💗", "💋", "😈"][i % 4]);
      }, i * 40);
    }
  }

  // sexy feedback message (disappears after 1.5s)
  function sexyFeedback(msg, isGood = true) {
    const feedback = document.createElement('div');
    feedback.innerText = msg;
    feedback.style.position = 'fixed';
    feedback.style.bottom = '20px';
    feedback.style.left = '50%';
    feedback.style.transform = 'translateX(-50%)';
    feedback.style.backgroundColor = '#de5a7e';
    feedback.style.color = 'white';
    feedback.style.padding = '10px 24px';
    feedback.style.borderRadius = '60px';
    feedback.style.fontWeight = 'bold';
    feedback.style.fontSize = '0.9rem';
    feedback.style.zIndex = '10000';
    feedback.style.backdropFilter = 'blur(4px)';
    feedback.style.boxShadow = '0 6px 20px #c4456e70';
    feedback.style.border = '1px solid #ffc0d0';
    feedback.style.fontFamily = 'monospace';
    document.body.appendChild(feedback);
    setTimeout(() => feedback.remove(), 1600);
  }

  // RENDER FUNCTION (your original logic, but with extra love on click feedback)
  function render() {
    const left = document.getElementById('listLeft');
    const right = document.getElementById('listRight');
    left.innerHTML = ''; right.innerHTML = '';

    config.activities.forEach((act, i) => {
      const div = document.createElement('div');
      div.className = 'check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = state.acts[act] || false;
      
      // add sexy feedback when checkbox changes
      cb.onchange = (e) => {
        state.acts[act] = cb.checked;
        if (cb.checked) {
          sexyFeedback(`✨ added "${act}" — oh yes, baby ✨`);
          showLoveBurst(div);
        } else {
          sexyFeedback(`😏 removed "${act}" — saving for next time 😏`);
        }
      };
      
      const lbl = document.createElement('label');
      lbl.textContent = act;
      
      div.appendChild(cb);
      div.appendChild(lbl);
      
      // make entire item clickable with nice feel
      div.addEventListener('click', (e) => {
        if (e.target !== cb) {
          cb.checked = !cb.checked;
          const newState = cb.checked;
          state.acts[act] = newState;
          if (newState) {
            sexyFeedback(`💕 "${act}" selected — you're so naughty 💕`);
            showLoveBurst(div);
          } else {
            sexyFeedback(`🖤 unchecked "${act}" — maybe later? 🖤`);
          }
        }
      });
      
      // Put in left column first, then right column exactly as you had
      if (i < 5) { left.appendChild(div); } 
      else { right.appendChild(div); }
    });

    const ynBox = document.getElementById('yesNoGroup');
    ynBox.innerHTML = '';
    config.yesNo.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'choice-btn' + (state.yn === opt.v ? ' selected-' + opt.v : '');
      btn.textContent = opt.t;
      btn.onclick = () => { 
        state.yn = opt.v; 
        render();
        let msg = '';
        if(opt.v === 'yes') msg = "💋 YES! let's get wild, love 💋";
        else if(opt.v === 'no') msg = "🥺 okay sweetheart, i respect that 🥺";
        else msg = "😏 maybe... i love the suspense 😏";
        sexyFeedback(msg);
        showLoveBurst(btn);
      };
      ynBox.appendChild(btn);
    });

    const abcBox = document.getElementById('abcGroup');
    abcBox.innerHTML = '';
    config.abc.forEach((opt, idx) => {
      const card = document.createElement('div');
      card.className = 'abc-card' + (state.abc === idx ? ' selected' : '');
      card.innerHTML = `<div>${opt.i}</div><div style="font-size:0.8rem">${opt.l}</div>`;
      card.onclick = () => { 
        state.abc = idx; 
        render();
        let partnerMsg = '';
        if(idx === 0) partnerMsg = "👩‍❤️‍👨 Both of us — perfect balance, baby 👩‍❤️‍👨";
        else if(idx === 1) partnerMsg = "🧛 Just me — selfish but sexy 😈";
        else partnerMsg = "🧕 Just you — all about you, my love 💖";
        sexyFeedback(partnerMsg);
        showLoveBurst(card);
      };
      abcBox.appendChild(card);
    });
  }

  // ---- SAVE / LOAD (unchanged, your original system) ----
  document.getElementById('saveBtn').onclick = () => {
    const note = document.getElementById('freeNote').value;
    const dataToSave = { ...state, note: note };
    const data = btoa(encodeURIComponent(JSON.stringify(dataToSave)));
    const url = window.location.href.split('#')[0] + '#data=' + data;
    document.getElementById('shareArea').style.display = 'block';
    document.getElementById('linkPath').textContent = url;
    sexyFeedback("✨ spicy link ready! copy & send to your Mrs ✨", true);
    // scroll to share area
    document.getElementById('shareArea').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  document.getElementById('copyBtn').onclick = () => {
    const linkText = document.getElementById('linkPath').textContent;
    navigator.clipboard.writeText(linkText).then(() => {
      sexyFeedback("📋 link copied! now send her some love 💌");
    }).catch(() => {
      alert("copy manually, honey 💋");
    });
  };
  
  // reset with sexy confirmation
  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) {
    resetBtn.onclick = () => {
      if(confirm("🔥 reset all desires? we can start fresh, my love 🔥")) {
        state = { acts: {}, yn: null, abc: null };
        document.getElementById('freeNote').value = '';
        render();
        document.getElementById('shareArea').style.display = 'none';
        sexyFeedback("💗 wiped clean — ready for new fantasies 💗");
        showLoveBurst(resetBtn);
      }
    };
  }

  // Load from URL if data exists (preserving your original loader)
  const hash = window.location.hash;
  if (hash.includes('data=')) {
    try {
      const saved = JSON.parse(decodeURIComponent(atob(hash.split('data=')[1])));
      state = saved;
      document.getElementById('freeNote').value = saved.note || '';
      render();
      setTimeout(() => {
        sexyFeedback("💞 loaded your saved desires... let's continue, baby 💞");
      }, 200);
    } catch(e) {}
  } else {
    // small welcome flirt
    setTimeout(() => {
      sexyFeedback("😈 select what you crave... i'm all yours 😈");
    }, 500);
  }

  render();

  // extra ambient floating hearts (soft background romance)
  setInterval(() => {
    if (document.hidden) return;
    const heartSpan = document.createElement('span');
    heartSpan.innerHTML = '❤️‍🔥';
    heartSpan.style.position = 'fixed';
    heartSpan.style.bottom = '-10px';
    heartSpan.style.left = Math.random() * window.innerWidth + 'px';
    heartSpan.style.fontSize = '16px';
    heartSpan.style.opacity = '0.5';
    heartSpan.style.pointerEvents = 'none';
    heartSpan.style.transition = 'all 4s linear';
    heartSpan.style.zIndex = '999';
    document.body.appendChild(heartSpan);
    setTimeout(() => {
      heartSpan.style.transform = 'translateY(-90px)';
      heartSpan.style.opacity = '0';
    }, 20);
    setTimeout(() => heartSpan.remove(), 4000);
  }, 3500);
</script>
</body>
</html>
